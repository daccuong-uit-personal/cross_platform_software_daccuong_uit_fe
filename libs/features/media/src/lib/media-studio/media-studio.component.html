<div class="studio-shell">
  <aside class="studio-sidebar">
    <fe-bottom-menu></fe-bottom-menu>
  </aside>
  <main class="studio-main">
    <div class="studio-layout">
      <div class="studio-header">
    <div class="studio-title-block">
      <div class="studio-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="23 7 16 12 23 17 23 7"></polygon><rect x="1" y="5" width="15" height="14" rx="2" ry="2"></rect></svg>
      </div>
      <div>
        <h1>User Studio</h1>
        <p>Quản lý video và nội dung đa phương tiện của bạn.</p>
      </div>
    </div>
    
    <button class="upload-btn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
      Tải lên nội dung mới
    </button>
  </div>

  <div class="studio-card">
    <div class="studio-controls">
      <div class="search-box">
        <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
        <input placeholder="Tìm kiếm nội dung..." (input)="onFilterChange({ ...filters, name: $any($event.target).value })" />
      </div>
      <div class="filter-actions">
        <button class="filter-btn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="4" y1="21" x2="4" y2="14"></line><line x1="4" y1="10" x2="4" y2="3"></line><line x1="12" y1="21" x2="12" y2="12"></line><line x1="12" y1="8" x2="12" y2="3"></line><line x1="20" y1="21" x2="20" y2="16"></line><line x1="20" y1="12" x2="20" y2="3"></line><line x1="1" y1="14" x2="7" y2="14"></line><line x1="9" y1="8" x2="15" y2="8"></line><line x1="17" y1="16" x2="23" y2="16"></line></svg>
          Bộ lọc
        </button>
      </div>
    </div>

    <div class="table-container">
      <ui-shared-table
        [columns]="columns"
        [data]="items"
        [total]="total"
        [pageIndex]="page"
        [pageSize]="pageSize"
        (pageChange)="onPageChange($event)"
        (sortChange)="onSortChange($event)"
        (rowDelete)="onDelete($event)">
      </ui-shared-table>
    </div>
  </div>
    </div>
  </main>
</div>
