<div class="feed-container">
  <!-- Feed Tabs (Sticky Main Navigation) -->
  <div class="feed-tabs">
    <button
      *ngFor="let tab of tabs"
      class="tab"
      [class.active]="activeTab() === tab.id"
      (click)="selectTab(tab.id)"
    >
      {{ tab.label }}
    </button>
  </div>

  <!-- Feed Header -->
  <div class="feed-header">
    <div class="compose-card">
      <div class="compose-top">
        <button type="button" class="compose-input" (click)="onCreatePost()">
          <span class="compose-input-avatar" aria-hidden="true"></span>
          Chuyện gì đang xảy ra?
        </button>
      </div>
      <div class="compose-actions">
        <div class="action-buttons compact">
          <button class="action-btn" title="Hình ảnh">
            <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%236b7280' stroke-width='2.4' stroke-linecap='round' stroke-linejoin='round'%3E%3Crect x='4' y='4' width='16' height='16' rx='3' opacity='0.16'/%3E%3Cpath d='M8 10a2 2 0 1 0 4 0 2 2 0 0 0-4 0Z'/%3E%3Cpath d='M4 18l5-5 4 4 5-5'/%3E%3C/svg%3E" alt="Hình ảnh" />
          </button>
          <button class="action-btn" title="GIF">
            <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%236b7280' stroke-width='2.4' stroke-linecap='round' stroke-linejoin='round'%3E%3Crect x='3' y='4' width='18' height='16' rx='3' opacity='0.16'/%3E%3Cpath d='M7 7v10'/%3E%3Cpath d='M12 7v10'/%3E%3Cpath d='M17 7v10'/%3E%3Cpath d='M3 11h18'/%3E%3C/svg%3E" alt="GIF" />
          </button>
          <button class="action-btn" title="Ẩn bài viết">
            <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%236b7280' stroke-width='2.4' stroke-linecap='round' stroke-linejoin='round'%3E%3Cpath d='M1 1l22 22'/%3E%3Cpath d='M17.94 17.94A10.94 10.94 0 0 1 12 20c-5 0-9.27-3.11-11-8a10.94 10.94 0 0 1 4.11-4.64'/%3E%3Cpath d='M14.12 14.12A3.5 3.5 0 0 1 9.88 9.88'/%3E%3C/svg%3E" alt="Ẩn bài viết" />
          </button>
          <button class="action-btn" title="Cảm xúc">
            <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%236b7280' stroke-width='2.4' stroke-linecap='round' stroke-linejoin='round'%3E%3Ccircle cx='12' cy='12' r='8'/%3E%3Cpath d='M8 14s1.5 2 4 2 4-2 4-2'/%3E%3Cpath d='M9 10h.01M15 10h.01'/%3E%3C/svg%3E" alt="Cảm xúc" />
          </button>
          <button class="action-btn" title="Máy ảnh">
            <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%236b7280' stroke-width='2.4' stroke-linecap='round' stroke-linejoin='round'%3E%3Cpath d='M5 7h3l2-3h4l2 3h3a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V9a2 2 0 0 1 2-2z'/%3E%3Ccircle cx='12' cy='13' r='4'/%3E%3C/svg%3E" alt="Máy ảnh" />
          </button>
          <button class="action-btn" title="Vị trí">
            <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%236b7280' stroke-width='2.4' stroke-linecap='round' stroke-linejoin='round'%3E%3Cpath d='M12 21s8-4.5 8-11a8 8 0 0 0-16 0c0 6.5 8 11 8 11z'/%3E%3Ccircle cx='12' cy='10' r='3'/%3E%3C/svg%3E" alt="Vị trí" />
          </button>
          <button class="action-btn" title="Cờ">
            <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%236b7280' stroke-width='2.4' stroke-linecap='round' stroke-linejoin='round'%3E%3Cpath d='M4 5v14'/%3E%3Cpath d='M4 5c3-1 5-1 8 0s5-1 8 0v6c-3-1-5-1-8 0s-5-1-8 0'/%3E%3C/svg%3E" alt="Cờ" />
          </button>
        </div>
        <button type="button" class="post-btn">Đăng</button>
      </div>
    </div>
  </div>

  <!-- Posts List -->
  <div class="feed-posts">
    <app-post-card *ngFor="let post of filteredPosts()" [post]="post"></app-post-card>
  </div>
</div>
