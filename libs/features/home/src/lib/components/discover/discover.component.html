<div class="discover-page">
  <h1>Discover</h1>
  <p>Trending tags, creators, and content previews appear here.</p>
  <div class="discover-grid">
    <div class="discover-card" *ngFor="let item of [1,2,3,4]">
      <div class="media-block">Preview {{ item }}</div>
      <div class="label">Trending video</div>
    </div>
  </div>
</div>
