<div class="page-content">
  <h1 class="page-title">Đã tắt tiếng</h1>
  <p class="page-subtitle">{{ mockUsers.length }} người đã bị tắt tiếng</p>

  <div class="card-list">
    @for (user of mockUsers; track user.id) {
      <fe-friend-card variant="list-row" [user]="user" [context]="'muted'"></fe-friend-card>
    }
  </div>
</div>
