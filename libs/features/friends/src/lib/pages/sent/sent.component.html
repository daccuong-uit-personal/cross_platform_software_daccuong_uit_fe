<div class="page-content">
  <h1 class="page-title">Lời mời đã gửi</h1>
  <p class="page-subtitle">{{ mockUsers.length }} lời mời đang chờ phản hồi</p>

  <div class="card-grid">
    @for (user of mockUsers; track user.id) {
      <fe-friend-card variant="avatar-card" [user]="user" [context]="'sent'"></fe-friend-card>
    }
  </div>
</div>
