<div class="page-content">
  <h1 class="page-title">Người theo dõi</h1>
  <p class="page-subtitle">{{ mockUsers.length }} người đang theo dõi bạn</p>

  <div class="card-list">
    @for (user of mockUsers; track user.id) {
      <fe-friend-card variant="list-row" [user]="user" [context]="'followers'"></fe-friend-card>
    }
  </div>
</div>
