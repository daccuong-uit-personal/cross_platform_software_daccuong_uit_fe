<div class="page-content">
  <h1 class="page-title">Tất cả bạn bè</h1>
  <p class="page-subtitle">{{ mockUsers.length }} bạn bè</p>

  <div class="card-list">
    @for (user of mockUsers; track user.id) {
      <fe-friend-card variant="list-row" [user]="user" [context]="'all'"></fe-friend-card>
    }
  </div>
</div>
