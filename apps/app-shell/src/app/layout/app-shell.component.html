<div class="flex flex-col min-h-screen bg-surface-base text-text-base transition-colors duration-300">
  
  @if (authService.isAuthenticated()) {
    <ui-shared-header></ui-shared-header>
  }

  <div class="flex flex-1 min-h-0 pt-[72px]" [class.pt-0]="!authService.isAuthenticated()">
    <!-- Sidebar (Authenticated Only) -->
    @if (authService.isAuthenticated()) {
      <aside class="hidden lg:flex w-64 flex-col border-r border-border-subtle bg-surface-base sticky top-[72px] h-[calc(100vh-72px)] z-40">
      <div class="flex items-center gap-3 p-6 border-b border-border-subtle">
        <div class="flex h-10 w-10 items-center justify-center rounded-xl bg-brand-primary text-xl font-bold text-white shadow-glow">
          SC
        </div>
        <div class="flex flex-col">
          <span class="text-lg font-bold tracking-tight">Social Commerce</span>
          <span class="text-[10px] font-medium uppercase tracking-widest text-text-muted">Creator Hub</span>
        </div>
      </div>
      
      <nav class="flex-1 p-4 space-y-2">
        <a routerLink="/home" routerLinkActive="bg-surface-subtle text-brand-primary" class="flex items-center gap-3 px-4 py-3 rounded-xl font-semibold transition-all hover:bg-surface-subtle">
           <svg width="20" height="20" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M24 8L8 20V40H40V20L24 8Z" stroke="currentColor" stroke-width="4" stroke-linejoin="round"/></svg>
           Home
        </a>
        <a routerLink="/profile" routerLinkActive="bg-surface-subtle text-brand-primary" class="flex items-center gap-3 px-4 py-3 rounded-xl font-semibold transition-all hover:bg-surface-subtle">
           <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M12 12C14.2091 12 16 10.2091 16 8C16 5.79086 14.2091 4 12 4C9.79086 4 8 5.79086 8 8C8 10.2091 9.79086 12 12 12Z" stroke="currentColor" stroke-width="2"/><path d="M4 20C4 16.6863 6.68629 14 10 14H14C17.3137 14 20 16.6863 20 20" stroke="currentColor" stroke-width="2"/></svg>
           Profile
        </a>
        <a routerLink="/media" routerLinkActive="bg-surface-subtle text-brand-primary" class="flex items-center gap-3 px-4 py-3 rounded-xl font-semibold transition-all hover:bg-surface-subtle">
           <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M4 7H20V17H4V7Z" stroke="currentColor" stroke-width="2"/><path d="M8 10L11 12.5L8 15V10Z" fill="currentColor"/></svg>
           Media Studio
        </a>
        <a routerLink="/dashboard" routerLinkActive="bg-surface-subtle text-brand-primary" class="flex items-center gap-3 px-4 py-3 rounded-xl font-semibold transition-all hover:bg-surface-subtle">
           <svg width="20" height="20" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M44 40H4V8H44V40Z" fill="none" stroke="currentColor" stroke-width="4" stroke-linejoin="round"/><path d="M4 14H44" stroke="currentColor" stroke-width="4" stroke-linecap="round"/><path d="M14 8V40" stroke="currentColor" stroke-width="4" stroke-linecap="round"/></svg>
           Dashboard
        </a>
        <a routerLink="/settings" routerLinkActive="bg-surface-subtle text-brand-primary" class="flex items-center gap-3 px-4 py-3 rounded-xl font-semibold transition-all hover:bg-surface-subtle">
           <svg width="20" height="20" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M41.5 10H35.5C32.7386 10 30.5 12.2386 30.5 15C30.5 17.7614 32.7386 20 35.5 20H41.5V10Z" fill="none" stroke="currentColor" stroke-width="4" stroke-linejoin="round"/><path d="M22 15C22 11.134 18.866 8 15 8C11.134 8 8 11.134 8 15C8 18.866 11.134 22 15 22C18.866 22 22 18.866 22 15ZM22 15H30.5M30.5 15C30.5 12.2386 32.7386 10 35.5 10H41.5V20H35.5C32.7386 20 30.5 17.7614 30.5 15ZM30.5 15V26" stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/><path d="M8 33C8 29.134 11.134 26 15 26C18.866 26 22 29.134 22 33C22 36.866 18.866 40 15 40C11.134 40 8 36.866 8 33ZM8 33H30.5M30.5 33C30.5 30.2386 32.7386 28 35.5 28H41.5V38H35.5C32.7386 38 30.5 35.7614 30.5 33ZM30.5 33V22" stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/></svg>
           Settings
        </a>
      </nav>

      <div class="p-4 border-t border-border-subtle">
        <button (click)="authService.logout()" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl font-semibold text-error transition-all hover:bg-error/10">
           <svg width="20" height="20" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M23.9917 6L6 6V42H23.9917" stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/><path d="M33 33L42 24L33 15" stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/><path d="M16 23.9917H42" stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/></svg>
           Logout
        </button>
      </div>
    </aside>
  }

  <!-- Content Area -->
  <div class="flex-1 flex flex-col min-w-0">
    <main class="flex-1 w-full overflow-x-hidden">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>
</div>
