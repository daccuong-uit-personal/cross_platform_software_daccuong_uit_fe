<header class="glass-effect sticky top-0 z-50 flex flex-col items-start justify-between gap-4 px-8 py-4 sm:flex-row sm:items-center">
  <div class="flex items-center gap-3">
    <div class="flex h-10 w-10 items-center justify-center rounded-xl bg-brand-primary text-xl font-bold text-white shadow-glow">
      SC
    </div>
    <div class="flex flex-col">
      <a routerLink="/" class="text-xl font-bold tracking-tight text-text-base transition-colors hover:text-brand-primary">Social Commerce</a>
      <span class="text-xs font-medium uppercase tracking-widest text-text-muted">Creator Hub</span>
    </div>
  </div>

  <nav class="flex items-center gap-1 rounded-2xl bg-surface-subtle/50 p-1">
    <a routerLink="/auth/login" routerLinkActive="bg-white text-brand-primary shadow-sm" class="inline-flex items-center justify-center rounded-xl px-5 py-2 text-sm font-semibold text-text-muted transition-all hover:text-text-base">Login</a>
    <a routerLink="/auth/register" routerLinkActive="bg-white text-brand-primary shadow-sm" class="inline-flex items-center justify-center rounded-xl px-5 py-2 text-sm font-semibold text-text-muted transition-all hover:text-text-base">Register</a>
    @if (authService.isAuthenticated()) {
      <a routerLink="/dashboard" routerLinkActive="bg-white text-brand-primary shadow-sm" class="ml-1 inline-flex items-center justify-center rounded-xl px-5 py-2 text-sm font-semibold text-text-muted transition-all hover:text-text-base">Dashboard</a>
    }
  </nav>
</header>

<main class="grid min-h-[calc(100vh-84px)] place-items-center p-5 sm:p-8">
  <router-outlet></router-outlet>
</main>
