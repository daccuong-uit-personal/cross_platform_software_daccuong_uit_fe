<div class="flex min-h-screen w-full bg-surface-base text-text-base transition-colors duration-300">
  
  <!-- Sidebar (Authenticated Only) -->
  @if (authService.isAuthenticated()) {
    <aside class="hidden lg:flex w-64 flex-col border-r border-border-subtle bg-surface-base sticky top-0 h-screen z-40">
      <div class="flex items-center gap-3 p-6 border-b border-border-subtle">
        <div class="flex h-10 w-10 items-center justify-center rounded-xl bg-brand-primary text-xl font-bold text-white shadow-glow">
          SC
        </div>
        <div class="flex flex-col">
          <span class="text-lg font-bold tracking-tight">Social Commerce</span>
          <span class="text-[10px] font-medium uppercase tracking-widest text-text-muted">Creator Hub</span>
        </div>
      </div>
      
      <nav class="flex-1 p-4 space-y-2">
        <a routerLink="/dashboard" routerLinkActive="bg-surface-subtle text-brand-primary" class="flex items-center gap-3 px-4 py-3 rounded-xl font-semibold transition-all hover:bg-surface-subtle">
           <svg width="20" height="20" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M44 40H4V8H44V40Z" fill="none" stroke="currentColor" stroke-width="4" stroke-linejoin="round"/><path d="M4 14H44" stroke="currentColor" stroke-width="4" stroke-linecap="round"/><path d="M14 8V40" stroke="currentColor" stroke-width="4" stroke-linecap="round"/></svg>
           Dashboard
        </a>
        <!-- Add more menu items here -->
      </nav>

      <div class="p-4 border-t border-border-subtle">
        <button (click)="authService.logout()" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl font-semibold text-error transition-all hover:bg-error/10">
           <svg width="20" height="20" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M23.9917 6L6 6V42H23.9917" stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/><path d="M33 33L42 24L33 15" stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/><path d="M16 23.9917H42" stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/></svg>
           Logout
        </button>
      </div>
    </aside>
  }

  <!-- Content Area -->
  <div class="flex-1 flex flex-col min-w-0">
    <main class="flex-1 w-full overflow-x-hidden">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>
