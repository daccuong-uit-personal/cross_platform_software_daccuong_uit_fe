openapi: "3.1.0"
info:
  title: "Cross-Platform Social Creator Platform — Frontend-Defined API Spec"
  version: "1.0.0"
  description: |
    ## ⚠️ QUAN TRỌNG — ĐỌC TRƯỚC KHI DÙNG
    
    File này là **Hợp đồng API do Frontend định nghĩa trước** (Frontend-First API Contract).
    
    **Trạng thái hiện tại:**
    - ✅ FE đang dùng: Mock data local (môi trường development)
    - ⏳ BE chưa triển khai: Các endpoint này chưa có server thật
    - 🎯 Mục tiêu: Khi FE chạy mượt với Mock Data → File này trở thành Hard Contract cho BE
    
    **Workflow:**
    1. FE thiết kế endpoint và response shape theo nhu cầu UI
    2. FE implement Service + Mock Data theo spec này
    3. FE test đầy đủ với mock data
    4. File này được bàn giao cho BE team → BE implement đúng theo spec
    5. FE chỉ cần đổi environment flag để switch từ mock sang real API

  contact:
    name: "Frontend Team"
  license:
    name: "Internal"

servers:
  - url: "http://localhost:3000/api/v1"
    description: "Local Mock Server (json-server hoặc MSW)"
  - url: "https://api.reals-platform.dev/api/v1"
    description: "Development Backend (khi BE sẵn sàng)"
  - url: "https://api.reals-platform.com/api/v1"
    description: "Production"

tags:
  - name: "auth"
    description: "Xác thực người dùng"
  - name: "users"
    description: "Người dùng — Profile, Settings, Block, Mute"
  - name: "friendship"
    description: "Bạn bè — Friend requests, Mutual friends"
  - name: "follow"
    description: "Follow/Unfollow, Follow requests"
  - name: "groups"
    description: "Nhóm — CRUD, Members, Feed"
  - name: "posts"
    description: "Bài đăng — CRUD, Feed, Discover"
  - name: "comments"
    description: "Bình luận — Nested comments, Replies"
  - name: "reactions"
    description: "Reactions — Like, Love, Haha, ..."
  - name: "bookmarks"
    description: "Bookmarks — Save posts, reels, videos, novels"
  - name: "reposts"
    description: "Repost / Quote Repost"
  - name: "notifications"
    description: "Thông báo — In-app notifications"
  - name: "reels"
    description: "Reels — Short videos"
  - name: "videos"
    description: "Videos — Long videos, Playlists"
  - name: "stories"
    description: "Stories — 24h stories"
  - name: "novels"
    description: "Novels — Truyện, Chapters, Reading progress"
  - name: "search"
    description: "Tìm kiếm toàn diện"
  - name: "hashtags"
    description: "Hashtags — Trending, Detail"
  - name: "media"
    description: "Media assets — Upload, Processing status"
  - name: "analytics"
    description: "Analytics — Views, Watch time, Impressions"

# ==============================================================================
# PATHS
# ==============================================================================
paths:

  # ============================================================
  # AUTH
  # ============================================================
  /auth/login:
    post:
      tags: [auth]
      summary: "Đăng nhập bằng email + password"
      operationId: "auth.login"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
            example:
              email: "demouser@reals.com"
              password: "Demo@123"
      responses:
        "200":
          description: "Đăng nhập thành công"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedError"

  /auth/register:
    post:
      tags: [auth]
      summary: "Đăng ký tài khoản mới"
      operationId: "auth.register"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: "Đăng ký thành công"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "422":
          $ref: "#/components/responses/ValidationError"

  /auth/refresh:
    post:
      tags: [auth]
      summary: "Làm mới access token"
      operationId: "auth.refresh"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                refreshToken:
                  type: string
      responses:
        "200":
          description: "Token mới"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthTokens"

  /auth/logout:
    post:
      tags: [auth]
      summary: "Đăng xuất — invalidate token"
      operationId: "auth.logout"
      security:
        - bearerAuth: []
      responses:
        "200":
          description: "Đăng xuất thành công"

  /auth/logout-all:
    post:
      tags: [auth]
      summary: "Đăng xuất tất cả thiết bị"
      operationId: "auth.logoutAll"
      security:
        - bearerAuth: []
      responses:
        "200":
          description: "Đã đăng xuất tất cả thiết bị"

  /auth/forgot-password:
    post:
      tags: [auth]
      summary: "Gửi email reset password"
      operationId: "auth.forgotPassword"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  format: email
      responses:
        "200":
          description: "Email đã được gửi"

  /auth/reset-password:
    post:
      tags: [auth]
      summary: "Reset password bằng token"
      operationId: "auth.resetPassword"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token, password]
              properties:
                token:
                  type: string
                password:
                  type: string
                  minLength: 8
      responses:
        "200":
          description: "Password đã được đặt lại"
        "400":
          $ref: "#/components/responses/ValidationError"

  /auth/verify-email:
    post:
      tags: [auth]
      summary: "Xác thực email bằng token"
      operationId: "auth.verifyEmail"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token]
              properties:
                token:
                  type: string
      responses:
        "200":
          description: "Email đã được xác thực"

  /auth/resend-verification:
    post:
      tags: [auth]
      summary: "Gửi lại email xác thực"
      operationId: "auth.resendVerification"
      security:
        - bearerAuth: []
      responses:
        "200":
          description: "Email xác thực đã được gửi lại"

  /auth/change-password:
    post:
      tags: [auth]
      summary: "Đổi mật khẩu"
      operationId: "auth.changePassword"
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [currentPassword, newPassword]
              properties:
                currentPassword:
                  type: string
                newPassword:
                  type: string
                  minLength: 8
      responses:
        "200":
          description: "Mật khẩu đã được đổi"
        "401":
          $ref: "#/components/responses/UnauthorizedError"

  /auth/sessions:
    get:
      tags: [auth]
      summary: "Lấy danh sách phiên đăng nhập đang hoạt động"
      operationId: "auth.getSessions"
      security:
        - bearerAuth: []
      responses:
        "200":
          description: "Danh sách sessions"
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Session"

  /auth/sessions/{sessionId}:
    delete:
      tags: [auth]
      summary: "Thu hồi một phiên đăng nhập"
      operationId: "auth.revokeSession"
      security:
        - bearerAuth: []
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: "Session đã bị thu hồi"

  # ============================================================
  # USERS
  # ============================================================
  /users/suggestions:
    get:
      tags: [users]
      summary: "Gợi ý người dùng nên follow"
      operationId: "users.getSuggestions"
      security:
        - bearerAuth: []
      parameters:
        - name: "limit"
          in: query
          schema:
            type: integer
            default: 10
      responses:
        "200":
          description: "Danh sách gợi ý"
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"

  /users/{userId}:
    get:
      tags: [users]
      summary: "Lấy thông tin profile người dùng"
      operationId: "users.getProfile"
      parameters:
        - $ref: "#/components/parameters/UserIdParam"
      responses:
        "200":
          description: "Thông tin người dùng"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"

    put:
      tags: [users]
      summary: "Cập nhật profile"
      operationId: "users.updateProfile"
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/UserIdParam"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProfileRequest"
      responses:
        "200":
          description: "Profile sau khi cập nhật"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"

  /users/{userId}/profile-summary:
    get:
      tags: [users]
      summary: "Lấy thông tin summary profile cho page profile"
      operationId: "users.getProfileSummary"
      parameters:
        - $ref: "#/components/parameters/UserIdParam"
      responses:
        "200":
          description: "Thông tin summary profile"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProfileSummaryResponse"

  /users/{userId}/profile-insights:
    get:
      tags: [users]
      summary: "Lấy thống kê truy cập tuần và tương tác tuần cho profile"
      operationId: "users.getProfileInsights"
      parameters:
        - $ref: "#/components/parameters/UserIdParam"
      responses:
        "200":
          description: "Thông tin truy cập và tương tác profile"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProfileInsightsResponse"

  /users/{userId}/profile-tabs:
    get:
      tags: [users]
      summary: "Lấy danh sách subtab profile người dùng"
      operationId: "users.getProfileTabs"
      parameters:
        - $ref: "#/components/parameters/UserIdParam"
      responses:
        "200":
          description: "Danh sách subtab profile"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProfileTabsResponse"

  /users/{userId}/profile-tabs/{tabId}:
    get:
      tags: [users]
      summary: "Lấy dữ liệu cho 1 subtab profile"
      operationId: "users.getProfileTabData"
      parameters:
        - $ref: "#/components/parameters/UserIdParam"
        - name: "tabId"
          in: path
          required: true
          schema:
            type: string
          description: "ID subtab, ví dụ posts, videos, reels"
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/PageSizeParam"
      responses:
        "200":
          description: "Dữ liệu subtab profile"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProfileTabDataResponse"

  /users/{userId}/reels:
    get:
      tags: [users, reels]
      summary: "Lấy danh sách Reels của người dùng"
      operationId: "users.getReels"
      parameters:
        - $ref: "#/components/parameters/UserIdParam"
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/PageSizeParam"
      responses:
        "200":
          description: "Danh sách Reels"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedReelsResponse"

  /users/{userId}/videos:
    get:
      tags: [users, videos]
      summary: "Lấy danh sách Videos của người dùng"
      operationId: "users.getVideos"
      parameters:
        - $ref: "#/components/parameters/UserIdParam"
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/PageSizeParam"
      responses:
        "200":
          description: "Danh sách Videos"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedVideosResponse"

  /users/{userId}/stories:
    get:
      tags: [users, stories]
      summary: "Lấy danh sách Stories của người dùng"
      operationId: "users.getStories"
      parameters:
        - $ref: "#/components/parameters/UserIdParam"
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/PageSizeParam"
      responses:
        "200":
          description: "Danh sách Stories"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedStoriesResponse"

  /users/{userId}/block:
    post:
      tags: [users]
      summary: "Chặn người dùng"
      operationId: "users.block"
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/UserIdParam"
      responses:
        "200":
          description: "Đã chặn"

    delete:
      tags: [users]
      summary: "Bỏ chặn người dùng"
      operationId: "users.unblock"
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/UserIdParam"
      responses:
        "200":
          description: "Đã bỏ chặn"

  /users/{userId}/mute:
    post:
      tags: [users]
      summary: "Tắt thông báo từ người dùng"
      operationId: "users.mute"
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/UserIdParam"
      responses:
        "200":
          description: "Đã tắt thông báo"

    delete:
      tags: [users]
      summary: "Bỏ tắt thông báo từ người dùng"
      operationId: "users.unmute"
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/UserIdParam"
      responses:
        "200":
          description: "Đã bỏ tắt thông báo"

  /users/{userId}/report:
    post:
      tags: [users]
      summary: "Báo cáo người dùng"
      operationId: "users.report"
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/UserIdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReportRequest"
      responses:
        "200":
          description: "Đã gửi báo cáo"

  /users/me/privacy:
    get:
      tags: [users]
      summary: "Lấy cài đặt quyền riêng tư"
      operationId: "users.getPrivacySettings"
      security:
        - bearerAuth: []
      responses:
        "200":
          description: "Cài đặt quyền riêng tư"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PrivacySettingsResponse"

    put:
      tags: [users]
      summary: "Cập nhật cài đặt quyền riêng tư"
      operationId: "users.updatePrivacySettings"
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PrivacySettings"
      responses:
        "200":
          description: "Đã cập nhật"

  /users/me/account-settings:
    get:
      tags: [users]
      summary: "Lấy cài đặt tài khoản"
      operationId: "users.getAccountSettings"
      security:
        - bearerAuth: []
      responses:
        "200":
          description: "Cài đặt tài khoản"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountSettingsResponse"

    put:
      tags: [users]
      summary: "Cập nhật cài đặt tài khoản"
      operationId: "users.updateAccountSettings"
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AccountSettings"
      responses:
        "200":
          description: "Đã cập nhật"

  /users/me/blocked:
    get:
      tags: [users]
      summary: "Danh sách người dùng đang bị chặn"
      operationId: "users.getBlockedUsers"
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/PageParam"
      responses:
        "200":
          description: "Danh sách bị chặn"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedUsersResponse"

  # ============================================================
  # FOLLOW
  # ============================================================
  /users/{userId}/follow:
    post:
      tags: [follow]
      summary: "Follow người dùng"
      operationId: "users.follow"
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/UserIdParam"
      responses:
        "200":
          description: "Đã follow hoặc đã gửi follow request (private account)"
          content:
            application/json:
              schema:
                type: object
                properties:
                  followerCount:
                    type: integer
                  isFollowedByCurrentUser:
                    type: boolean
                  isPending:
                    type: boolean
                    description: "true nếu tài khoản private và đang chờ duyệt"

    delete:
      tags: [follow]
      summary: "Unfollow người dùng"
      operationId: "users.unfollow"
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/UserIdParam"
      responses:
        "200":
          description: "Đã unfollow"

  /users/{userId}/followers:
    get:
      tags: [follow]
      summary: "Danh sách followers"
      operationId: "users.getFollowers"
      parameters:
        - $ref: "#/components/parameters/UserIdParam"
        - $ref: "#/components/parameters/PageParam"
      responses:
        "200":
          description: "Danh sách followers"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedUsersResponse"

  /users/{userId}/following:
    get:
      tags: [follow]
      summary: "Danh sách đang theo dõi"
      operationId: "users.getFollowing"
      parameters:
        - $ref: "#/components/parameters/UserIdParam"
        - $ref: "#/components/parameters/PageParam"
      responses:
        "200":
          description: "Danh sách following"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedUsersResponse"

  /follow/requests:
    get:
      tags: [follow]
      summary: "Danh sách follow requests đang chờ duyệt (tài khoản private)"
      operationId: "follow.getRequests"
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/PageParam"
      responses:
        "200":
          description: "Danh sách follow requests"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedUsersResponse"

  /follow/requests/{userId}/approve:
    post:
      tags: [follow]
      summary: "Chấp nhận follow request"
      operationId: "follow.approveRequest"
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/UserIdParam"
      responses:
        "200":
          description: "Đã chấp nhận"

  /follow/requests/{userId}/reject:
    post:
      tags: [follow]
      summary: "Từ chối follow request"
      operationId: "follow.rejectRequest"
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/UserIdParam"
      responses:
        "200":
          description: "Đã từ chối"

  # ============================================================
  # FRIENDSHIP
  # ============================================================
  /friends:
    get:
      tags: [friendship]
      summary: "Danh sách bạn bè"
      operationId: "friends.list"
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/PageSizeParam"
      responses:
        "200":
          description: "Danh sách bạn bè"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedUsersResponse"

  /friends/suggestions:
    get:
      tags: [friendship]
      summary: "Gợi ý kết bạn"
      operationId: "friends.getSuggestions"
      security:
        - bearerAuth: []
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
      responses:
        "200":
          description: "Gợi ý kết bạn"
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"

  /friends/requests:
    get:
      tags: [friendship]
      summary: "Lời mời kết bạn nhận được"
      operationId: "friends.getRequests"
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/PageParam"
      responses:
        "200":
          description: "Danh sách lời mời"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedUsersResponse"

  /friends/requests/sent:
    get:
      tags: [friendship]
      summary: "Lời mời kết bạn đã gửi"
      operationId: "friends.getSentRequests"
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/PageParam"
      responses:
        "200":
          description: "Danh sách lời mời đã gửi"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedUsersResponse"

  /friends/requests/{userId}:
    post:
      tags: [friendship]
      summary: "Gửi lời mời kết bạn"
      operationId: "friends.sendRequest"
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/UserIdParam"
      responses:
        "200":
          description: "Đã gửi lời mời"

    delete:
      tags: [friendship]
      summary: "Hủy lời mời kết bạn đã gửi"
      operationId: "friends.cancelRequest"
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/UserIdParam"
      responses:
        "200":
          description: "Đã hủy"

  /friends/requests/{userId}/accept:
    post:
      tags: [friendship]
