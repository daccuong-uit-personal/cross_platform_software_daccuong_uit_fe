        - $ref: "#/components/parameters/SearchQueryParam"
        - $ref: "#/components/parameters/PageParam"
      responses:
        "200":
          description: "Kết quả tìm kiếm reels"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedReelsResponse"

  /search/videos:
    get:
      tags: [search]
      summary: "Tìm kiếm videos"
      operationId: "search.videos"
      parameters:
        - $ref: "#/components/parameters/SearchQueryParam"
        - $ref: "#/components/parameters/PageParam"
      responses:
        "200":
          description: "Kết quả tìm kiếm videos"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedVideosResponse"

  /search/novels:
    get:
      tags: [search]
      summary: "Tìm kiếm novels"
      operationId: "search.novels"
      parameters:
        - $ref: "#/components/parameters/SearchQueryParam"
        - $ref: "#/components/parameters/PageParam"
      responses:
        "200":
          description: "Kết quả tìm kiếm novels"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedNovelsResponse"

  /search/groups:
    get:
      tags: [search]
      summary: "Tìm kiếm nhóm"
      operationId: "search.groups"
      parameters:
        - $ref: "#/components/parameters/SearchQueryParam"
        - $ref: "#/components/parameters/PageParam"
      responses:
        "200":
          description: "Kết quả tìm kiếm groups"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedGroupsResponse"

  # ============================================================
  # HASHTAGS
  # ============================================================
  /hashtags/trending:
    get:
      tags: [hashtags]
      summary: "Lấy danh sách trending hashtags"
      operationId: "hashtags.getTrending"
      parameters:
        - name: "limit"
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: "Trending hashtags"
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Hashtag"

  /hashtags/{tag}:
    get:
      tags: [hashtags]
      summary: "Chi tiết hashtag"
      operationId: "hashtags.getDetail"
      parameters:
        - name: tag
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: "Chi tiết hashtag"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HashtagDetailResponse"

  /hashtags/{tag}/related:
    get:
      tags: [hashtags]
      summary: "Hashtags liên quan"
      operationId: "hashtags.getRelated"
      parameters:
        - name: tag
          in: path
          required: true
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
      responses:
        "200":
          description: "Hashtags liên quan"
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Hashtag"

  /hashtags/{tag}/posts:
    get:
      tags: [hashtags]
      summary: "Lấy posts theo hashtag"
      operationId: "hashtags.getPostsByTag"
      parameters:
        - name: tag
          in: path
          required: true
          schema:
            type: string
        - $ref: "#/components/parameters/PageParam"
      responses:
        "200":
          description: "Danh sách posts với hashtag này"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedPostsResponse"

  # ============================================================
  # MEDIA
  # ============================================================
  /media/upload:
    post:
      tags: [media]
      summary: "Upload media file"
      operationId: "media.upload"
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                type:
                  type: string
                  enum: ["image", "video", "reel"]
      responses:
        "202":
          description: "Upload accepted, đang processing"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MediaAssetResponse"

  /media/avatar:
    post:
      tags: [media]
      summary: "Upload avatar"
      operationId: "media.uploadAvatar"
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
      responses:
        "200":
          description: "Avatar đã được upload"
          content:
            application/json:
              schema:
                type: object
                properties:
                  avatarUrl:
                    type: string

  /media/cover:
    post:
      tags: [media]
      summary: "Upload cover/banner"
      operationId: "media.uploadCover"
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
      responses:
        "200":
          description: "Cover đã được upload"
          content:
            application/json:
              schema:
                type: object
                properties:
                  coverUrl:
                    type: string

  /media/thumbnail:
    post:
      tags: [media]
      summary: "Upload thumbnail"
      operationId: "media.uploadThumbnail"
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
      responses:
        "200":
          description: "Thumbnail đã được upload"
          content:
            application/json:
              schema:
                type: object
                properties:
                  thumbnailUrl:
                    type: string

  /media/{mediaId}/status:
    get:
      tags: [media]
      summary: "Kiểm tra trạng thái processing của media"
      operationId: "media.getStatus"
      security:
        - bearerAuth: []
      parameters:
        - name: mediaId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: "Trạng thái hiện tại"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MediaAssetResponse"

  # ============================================================
  # ANALYTICS
  # ============================================================
  /analytics/overview:
    get:
      tags: [analytics]
      summary: "Tổng quan analytics của creator"
      operationId: "analytics.getOverview"
      security:
        - bearerAuth: []
      parameters:
        - name: period
          in: query
          schema:
            type: string
            enum: [7d, 30d, 90d, 1y]
            default: 30d
      responses:
        "200":
          description: "Tổng quan analytics"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalyticsOverviewResponse"

# ==============================================================================
# COMPONENTS
# ==============================================================================
components:

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    PageParam:
      name: page
      in: query
      schema:
        type: integer
        minimum: 1
        default: 1
      description: "Số trang (1-indexed)"

    PageSizeParam:
      name: pageSize
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 50
        default: 20
      description: "Số items mỗi trang"

    PostIdParam:
      name: postId
      in: path
      required: true
      schema:
        type: string
        format: uuid

    UserIdParam:
      name: userId
      in: path
      required: true
      schema:
        type: string
        format: uuid

    CommentIdParam:
      name: commentId
      in: path
      required: true
      schema:
        type: string
        format: uuid

    GroupIdParam:
      name: groupId
      in: path
      required: true
      schema:
        type: string
        format: uuid

    ReelIdParam:
      name: reelId
      in: path
      required: true
      schema:
        type: string
        format: uuid

    VideoIdParam:
      name: videoId
      in: path
      required: true
      schema:
        type: string
        format: uuid

    PlaylistIdParam:
      name: playlistId
      in: path
      required: true
      schema:
        type: string
        format: uuid

    NovelIdParam:
      name: novelId
      in: path
      required: true
      schema:
        type: string
        format: uuid

    ChapterIdParam:
      name: chapterId
      in: path
      required: true
      schema:
        type: string
        format: uuid

    SearchQueryParam:
      name: q
      in: query
      required: true
      schema:
        type: string
        minLength: 1

  schemas:

    # ---- AUTH ----
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 6

    RegisterRequest:
      type: object
      required: [email, password, username, displayName]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
        username:
          type: string
          minLength: 3
          maxLength: 30
          pattern: "^[a-zA-Z0-9_]+$"
        displayName:
          type: string
          minLength: 1
          maxLength: 50

    AuthTokens:
      type: object
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
        expiresIn:
          type: integer
          description: "Seconds until accessToken expires"

    AuthUser:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
        username:
          type: string
        displayName:
          type: string
        avatarUrl:
          type: string
          nullable: true
        role:
          type: string
          enum: [user, creator, admin]

    AuthResponse:
      type: object
      properties:
        user:
          $ref: "#/components/schemas/AuthUser"
        tokens:
          $ref: "#/components/schemas/AuthTokens"

    Session:
      type: object
      properties:
        id:
          type: string
        deviceName:
          type: string
        deviceType:
          type: string
          enum: [web, ios, android, desktop]
        ipAddress:
          type: string
        lastActiveAt:
          type: string
          format: date-time
        isCurrent:
          type: boolean

    # ---- USER ----
    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
        username:
          type: string
        displayName:
          type: string
        avatarUrl:
          type: string
          nullable: true
        bio:
          type: string
          nullable: true
        followerCount:
          type: integer
        followingCount:
          type: integer
        postCount:
          type: integer
        isFollowedByCurrentUser:
          type: boolean
        isFollowPending:
          type: boolean
          description: "true nếu follow request đang chờ duyệt"
        isFriend:
          type: boolean
        isBlocked:
          type: boolean
        isMuted:
          type: boolean
        isVerified:
          type: boolean
        isPrivate:
          type: boolean
        createdAt:
          type: string
          format: date-time

    UserResponse:
      allOf:
        - $ref: "#/components/schemas/ApiWrapper"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/User"

    UpdateProfileRequest:
      type: object
      properties:
        displayName:
          type: string
        bio:
          type: string
        avatarUrl:
          type: string
        coverUrl:
          type: string
        website:
          type: string
        location:
          type: string
        isPrivate:
          type: boolean

    PaginatedUsersResponse:
      allOf:
        - $ref: "#/components/schemas/ApiWrapper"
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: "#/components/schemas/User"
            meta:
              $ref: "#/components/schemas/PaginationMeta"

    PrivacySettings:
      type: object
      properties:
        isPrivateAccount:
          type: boolean
        whoCanSeeMyPosts:
          type: string
          enum: [everyone, friends, only_me]
        whoCanSendFriendRequest:
          type: string
          enum: [everyone, friends_of_friends]
        whoCanSeeMyFriendList:
          type: string
          enum: [everyone, friends, only_me]
        whoCanTagMe:
          type: string
          enum: [everyone, friends, no_one]

    PrivacySettingsResponse:
      allOf:
        - $ref: "#/components/schemas/ApiWrapper"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/PrivacySettings"

    AccountSettings:
      type: object
      properties:
        language:
          type: string
        emailNotifications:
          type: boolean
        pushNotifications:
          type: boolean
        twoFactorEnabled:
          type: boolean

    AccountSettingsResponse:
      allOf:
        - $ref: "#/components/schemas/ApiWrapper"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/AccountSettings"

    # ---- GROUP ----
    Group:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
          nullable: true
        coverUrl:
          type: string
          nullable: true
        privacy:
          type: string
          enum: [public, private]
        memberCount:
          type: integer
        postCount:
          type: integer
        isJoined:
          type: boolean
        isJoinPending:
          type: boolean
        myRole:
          type: string
          enum: [member, moderator, admin]
          nullable: true
        createdAt:
          type: string
          format: date-time

    CreateGroupRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
        description:
          type: string
        coverUrl:
          type: string
        privacy:
          type: string
          enum: [public, private]
          default: public

    UpdateGroupRequest:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        coverUrl:
          type: string
        privacy:
          type: string
          enum: [public, private]

    GroupResponse:
      allOf:
        - $ref: "#/components/schemas/ApiWrapper"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/Group"

    PaginatedGroupsResponse:
      allOf:
        - $ref: "#/components/schemas/ApiWrapper"
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: "#/components/schemas/Group"
            meta:
              $ref: "#/components/schemas/PaginationMeta"

    GroupMember:
      type: object
      properties:
        user:
          $ref: "#/components/schemas/User"
        role:
          type: string
          enum: [member, moderator, admin]
        joinedAt:
          type: string
          format: date-time

    PaginatedGroupMembersResponse:
      allOf:
        - $ref: "#/components/schemas/ApiWrapper"
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: "#/components/schemas/GroupMember"
            meta:
              $ref: "#/components/schemas/PaginationMeta"

    # ---- POST ----
    Post:
      type: object
      properties:
        id:
          type: string
          format: uuid
        author:
          $ref: "#/components/schemas/User"
        type:
          type: string
          enum: [text, image, gallery, poll, gif, link, repost, quote_repost]
        content:
          type: string
        mediaUrls:
          type: array
          items:
            type: string
        hashtags:
          type: array
          items:
            type: string
        poll:
          $ref: "#/components/schemas/Poll"
          nullable: true
        linkPreview:
          $ref: "#/components/schemas/LinkPreview"
          nullable: true
        originalPost:
          allOf:
            - $ref: "#/components/schemas/Post"
          nullable: true
          description: "Bài đăng gốc (khi type là repost hoặc quote_repost)"
        groupId:
          type: string
          nullable: true
        likeCount:
          type: integer
        commentCount:
          type: integer
        shareCount:
          type: integer
        repostCount:
          type: integer
        reactions:
          $ref: "#/components/schemas/ReactionCounts"
        isLikedByCurrentUser:
          type: boolean
        isBookmarkedByCurrentUser:
          type: boolean
        isRepostedByCurrentUser:
          type: boolean
        visibility:
          type: string
          enum: [public, friends, private]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    Poll:
      type: object
      properties:
        id:
          type: string
        question:
          type: string
        options:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
              text:
                type: string
              voteCount:
                type: integer
        totalVotes:
          type: integer
        myVoteOptionId:
          type: string
          nullable: true
        endsAt:
          type: string
          format: date-time
          nullable: true

    LinkPreview:
      type: object
      properties:
        url:
          type: string
        title:
          type: string
        description:
          type: string
          nullable: true
        imageUrl:
          type: string
          nullable: true
        siteName:
          type: string
          nullable: true

    CreatePostRequest:
      type: object
      required: [content]
      properties:
        content:
          type: string
          minLength: 1
        type:
          type: string
          enum: [text, image, gallery, poll, gif, link]
          default: text
        mediaUrls:
          type: array
          items:
            type: string
        poll:
          type: object
          properties:
            question:
              type: string
            options:
              type: array
              items:
                type: string
            endsAt:
              type: string
              format: date-time
        linkUrl:
          type: string
          nullable: true
        visibility:
          type: string
          enum: [public, friends, private]
          default: public
        groupId:
          type: string
          nullable: true

    UpdatePostRequest:
      type: object
      properties:
        content:
          type: string
        visibility:
          type: string
          enum: [public, friends, private]

    PostResponse:
      allOf:
        - $ref: "#/components/schemas/ApiWrapper"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/Post"

    PaginatedPostsResponse:
      allOf:
        - $ref: "#/components/schemas/ApiWrapper"
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: "#/components/schemas/Post"
            meta:
              $ref: "#/components/schemas/PaginationMeta"

    PostAnalyticsResponse:
      allOf:
        - $ref: "#/components/schemas/ApiWrapper"
        - type: object
          properties:
            data:
              type: object
              properties:
                views:
                  type: integer
                impressions:
                  type: integer
                reaches:
                  type: integer
                engagementRate:
                  type: number
                likes:
                  type: integer
                comments:
                  type: integer
                shares:
                  type: integer
                saves:
                  type: integer
                reposts:
                  type: integer

    # ---- COMMENT ----
    Comment:
      type: object
      properties:
        id:
          type: string
          format: uuid
        postId:
          type: string
          format: uuid
          nullable: true
        targetId:
          type: string
          description: "ID của post/reel/video/chapter"
        targetType:
          type: string
          enum: [post, reel, video, chapter]
        author:
          $ref: "#/components/schemas/User"
        parentCommentId:
          type: string
          format: uuid
          nullable: true
        content:
          type: string
        likeCount:
          type: integer
        replyCount:
          type: integer
        reactions:
          $ref: "#/components/schemas/ReactionCounts"
        isLikedByCurrentUser:
          type: boolean
        isPinned:
          type: boolean
        depth:
          type: integer
          description: "Cấp độ reply (0 = root comment)"
        createdAt:
          type: string
          format: date-time

    CreateCommentRequest:
      type: object
      required: [content]
      properties:
        content:
          type: string
          minLength: 1
        parentCommentId:
          type: string
          nullable: true

    CommentResponse:
      allOf:
        - $ref: "#/components/schemas/ApiWrapper"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/Comment"

    PaginatedCommentsResponse:
      allOf:
        - $ref: "#/components/schemas/ApiWrapper"
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: "#/components/schemas/Comment"
            meta:
              $ref: "#/components/schemas/PaginationMeta"

    # ---- REACTION ----
    ReactionCounts:
      type: object
      properties:
        total:
          type: integer
        like:
          type: integer
        love:
          type: integer
        haha:
          type: integer
        wow:
          type: integer
        sad:
          type: integer
        angry:
          type: integer
        care:
          type: integer
        myReaction:
          type: string
          enum: [like, love, haha, wow, sad, angry, care]
          nullable: true

    UpsertReactionRequest:
      type: object
      required: [targetId, targetType, type]
      properties:
        targetId:
          type: string
        targetType:
          type: string
          enum: [post, comment, reel, video, novel, chapter]
        type:
          type: string
          enum: [like, love, haha, wow, sad, angry, care]

    ReactionSummaryResponse:
      allOf:
        - $ref: "#/components/schemas/ApiWrapper"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/ReactionCounts"

    Reaction:
      type: object
      properties:
        id:
          type: string
        user:
          $ref: "#/components/schemas/User"
        type:
          type: string
          enum: [like, love, haha, wow, sad, angry, care]
        createdAt:
          type: string
          format: date-time

    PaginatedReactionsResponse:
      allOf:
        - $ref: "#/components/schemas/ApiWrapper"
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: "#/components/schemas/Reaction"
            meta:
              $ref: "#/components/schemas/PaginationMeta"
            counts:
              $ref: "#/components/schemas/ReactionCounts"

    # ---- BOOKMARK ----
    Bookmark:
      type: object
      properties:
        id:
          type: string
        targetType:
          type: string
          enum: [post, reel, video, novel]
        targetId:
          type: string
        target:
          type: object
          description: "Post, Reel, Video hoặc Novel tương ứng"
        createdAt:
          type: string
          format: date-time

    CreateBookmarkRequest:
      type: object
      required: [targetId, targetType]
      properties:
        targetId:
          type: string
        targetType:
          type: string
          enum: [post, reel, video, novel]

    PaginatedBookmarksResponse:
      allOf:
        - $ref: "#/components/schemas/ApiWrapper"
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: "#/components/schemas/Bookmark"
            meta:
              $ref: "#/components/schemas/PaginationMeta"

    # ---- REPOST ----
    CreateRepostRequest:
      type: object
      required: [originalPostId]
      properties:
        originalPostId:
          type: string
        quoteContent:
          type: string
          nullable: true
          description: "Nếu có thì là quote repost"

    # ---- REEL ----
    Reel:
      type: object
      properties:
        id:
          type: string
          format: uuid
        author:
          $ref: "#/components/schemas/User"
        title:
          type: string
        content:
          type: string
        videoUrl:
          type: string
        coverUrl:
          type: string
        duration:
          type: integer
          description: "seconds"
        views:
          type: integer
        viewsFormatted:
          type: string
        likeCount:
          type: integer
        commentCount:
